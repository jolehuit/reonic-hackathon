# Cloud Build pipeline triggered on every push to main. Tuned to finish in
# ~1-2 min instead of the original ~3-4 min:
#   - DOCKER_BUILDKIT=1 enables BuildKit so the Dockerfile's cache-mount on
#     the pnpm store actually persists across runs.
#   - --cache-from=:latest pulls our previous image so unchanged Docker
#     layers are reused (`apt-get install`, `pnpm install` for unchanged
#     deps, `npx playwright install` etc).
#   - machineType: E2_HIGHCPU_32 → 4× more vCPUs vs the previous _8.
#     Halves the time of CPU-bound steps (next build, apt-get) for ~10
#     centimes extra per build. Worth it for hackathon iteration speed.
#
# Steps:
#   1. Pull :latest as a cache seed (no-op on first build).
#   2. Build the Docker image, tag with $COMMIT_SHA AND :latest, pass the
#      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY as a build-arg so `next build`
#      inlines it into the client bundle.
#   3. Push both tags to Artifact Registry.
#   4. Deploy the new image to Cloud Run (env vars set on the service from
#      the initial manual deploy persist across image updates, so we don't
#      pass --set-env-vars here).

steps:
  # ─── 0) Warm the cache by pulling the previous image (skip-fail on first
  #        ever build when there's no :latest yet)
  - id: cache-pull
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest \
          || echo "no previous image to cache from — first build"

  # ─── 1) Build with BuildKit + cache-from + the public Maps key as build-arg
  - id: build
    name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args:
      - build
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
      - --cache-from=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - --build-arg=NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=AIzaSyBlXBoCxp1AU3Bq6awbEWfpfKPQ430uZII
      - .
    waitFor: ['cache-pull']

  # ─── 2) Push both tags to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic
    waitFor: ['build']

  # ─── 3) Update the Cloud Run service to the new image
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - iconic
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
      - --region=europe-west1
      - --quiet
    waitFor: ['push']

options:
  machineType: E2_HIGHCPU_32
  logging: CLOUD_LOGGING_ONLY

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
