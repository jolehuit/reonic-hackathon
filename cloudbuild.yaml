# Cloud Build pipeline triggered on every push to main.
# 1. Build the Docker image from our root Dockerfile, tag with the commit SHA.
# 2. Push to Artifact Registry (the repo `cloud-run-source-deploy` was created
#    automatically by the first `gcloud run deploy --source .` call).
# 3. Update the Cloud Run service to point at the new image. We do NOT pass
#    --set-env-vars: the env vars set during the initial manual deploy
#    (FAL_KEY, GOOGLE_*) stay on the service across image updates, so we don't
#    need to know them in this YAML.

steps:
  # ─── 1) Build (uses BuildKit cache to speed up incremental layers)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
      - --cache-from=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
      - .

  # ─── 2) Push both tags to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic
    waitFor: ['build']

  # ─── 3) Update the Cloud Run service to the new image
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - iconic
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
      - --region=europe-west1
      - --quiet
    waitFor: ['push']

# Beefier machine — chromium download in the Dockerfile is the long pole;
# E2_HIGHCPU_8 cuts it from ~3 min to ~1 min on cold builds.
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Tell Cloud Build the produced images so the build run record links them.
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/iconic:latest
